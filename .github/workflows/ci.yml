name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact event candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - name: Validate exact candidate without object drift
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SHA: ${{ github.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          expected_commit="$EVENT_SHA"
          expected_tree="$(git rev-parse 'HEAD^{tree}')"
          identity_source="push_event_sha"
          tc10_eligible="NO"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            python3 - <<'PY_IDENTITY' > /tmp/bf0-candidate-identity.txt
          import os
          import re

          body = os.environ.get("PR_BODY", "")
          patterns = {
              "commit": r"(?m)^BF0-Candidate-Commit:\s*`?([0-9a-f]{40})`?\s*$",
              "tree": r"(?m)^BF0-Candidate-Tree:\s*`?([0-9a-f]{40})`?\s*$",
          }
          values = {}
          for name, pattern in patterns.items():
              matches = re.findall(pattern, body)
              if len(matches) != 1:
                  raise SystemExit(
                      f"expected exactly one BF0-Candidate-{name.title()} marker, found {len(matches)}"
                  )
              values[name] = matches[0]
          print(values["commit"])
          print(values["tree"])
          PY_IDENTITY
            expected_commit="$(sed -n '1p' /tmp/bf0-candidate-identity.txt)"
            expected_tree="$(sed -n '2p' /tmp/bf0-candidate-identity.txt)"
            test "$expected_commit" = "$PR_HEAD_SHA"
            identity_source="pull_request_body_external_identity"
            tc10_eligible="YES"
          fi

          assert_exact_candidate_and_clean() {
            phase="$1"
            resolved_commit="$(git rev-parse HEAD)"
            resolved_tree="$(git rev-parse 'HEAD^{tree}')"
            test "$resolved_commit" = "$expected_commit"
            test "$resolved_tree" = "$expected_tree"
            git diff --exit-code --
            git diff --cached --exit-code --
            nonignored_untracked="$(git ls-files --others --exclude-standard)"
            test -z "$nonignored_untracked"
            printf -v "${phase}_commit" '%s' "$resolved_commit"
            printf -v "${phase}_tree" '%s' "$resolved_tree"
          }

          # No nonignored untracked file is permitted. Ignored dependency/build
          # outputs may exist, but no tracked or index byte may drift.
          assert_exact_candidate_and_clean pre_validation

          npm ci
          npm run lint
          npx tsc --noEmit --incremental false
          npm test
          npm run build
          git diff --check
          PYTHONPYCACHEPREFIX=/tmp/truthmarket-pycache python3 -m py_compile contracts/truth_market.py

          assert_exact_candidate_and_clean post_validation

          identity_file="$RUNNER_TEMP/ci-candidate-identity.txt"
          {
            printf 'event_name=%s\n' "$EVENT_NAME"
            printf 'identity_source=%s\n' "$identity_source"
            printf 'expected_candidate_commit=%s\n' "$expected_commit"
            printf 'expected_candidate_tree=%s\n' "$expected_tree"
            printf 'pre_validation_commit=%s\n' "$pre_validation_commit"
            printf 'pre_validation_tree=%s\n' "$pre_validation_tree"
            printf 'pre_validation_tracked_worktree_clean=YES\n'
            printf 'pre_validation_index_clean=YES\n'
            printf 'pre_validation_nonignored_untracked=NONE\n'
            printf 'post_validation_commit=%s\n' "$post_validation_commit"
            printf 'post_validation_tree=%s\n' "$post_validation_tree"
            printf 'post_validation_tracked_worktree_clean=YES\n'
            printf 'post_validation_index_clean=YES\n'
            printf 'post_validation_nonignored_untracked=NONE\n'
            printf 'untracked_policy=NO_NONIGNORED_UNTRACKED_FILES;_IGNORED_GENERATED_OUTPUTS_PERMITTED\n'
            printf 'git_version=%s\n' "$(git --version)"
            printf 'node_version=%s\n' "$(node --version)"
            printf 'npm_version=%s\n' "$(npm --version)"
            printf 'python_version=%s\n' "$(python3 --version 2>&1)"
            printf 'tc10_eligible=%s\n' "$tc10_eligible"
            printf 'validation_result=PASS\n'
          } | tee "$identity_file"
      - name: Retain candidate identity evidence
        uses: actions/upload-artifact@v4
        with:
          name: ci-candidate-identity-${{ github.run_id }}
          path: ${{ runner.temp }}/ci-candidate-identity.txt
          if-no-files-found: error
